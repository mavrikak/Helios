name: Helios
channels:
  - conda-forge
dependencies:
  # Build tools
  - make
  # Core compilers (for Linux, use platform-appropriate variants on macOS/Windows)
  - gxx_linux-64=11.4.0
  - gfortran_linux-64=11.4.0

  # Math and numerical libs
  - openblas
  - blitz

  # Python runtime and analysis tools
  - python=3.10
  - numpy
  - scipy
  - matplotlib
  - PySide6
  - tqdm
  - miepython
  
  # Doxygen and Graphviz
  - doxygen
  - graphviz
